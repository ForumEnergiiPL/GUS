name: Update GUS gas trade data

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions działa w UTC.
    # 14:20 UTC = 16:20 w Polsce w czasie letnim.
    - cron: "20 14 * * *"

permissions:
  contents: write

concurrency:
  group: gus-gas-trade-update
  cancel-in-progress: false

jobs:
  update-gus-gas-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests urllib3

      - name: Run GUS update script
        run: |
          python update_gus_gas_trade.py

      - name: Commit updated Excel file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -n "$(git status --porcelain gus_dbw_trade/gus_gas_TJ_2018_plus_IMPORT_EXPORT.xlsx)" ]; then
            git add gus_dbw_trade/gus_gas_TJ_2018_plus_IMPORT_EXPORT.xlsx
            git commit -m "Update GUS gas trade data"
            git push
          else
            echo "No changes to commit."
          fi
