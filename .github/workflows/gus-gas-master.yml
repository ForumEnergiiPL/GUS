name: GUS gas master Excel

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose what to do"
        required: true
        default: "append_year"
        type: choice
        options:
          - create_base_2018
          - append_year

      year:
        description: "Year to append, e.g. 2019, 2020, 2021. Ignored for create_base_2018."
        required: false
        default: "2019"

permissions:
  contents: write

jobs:
  update-gus-master:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests urllib3

      - name: Check required files
        run: |
          echo "Repository files:"
          ls -R

          if [ ! -f "gus_dbw_trade/03_section_positions.xlsx" ]; then
            echo "ERROR: Missing gus_dbw_trade/03_section_positions.xlsx"
            exit 1
          fi

          if [ ! -f "scripts/gus_gas_common.py" ]; then
            echo "ERROR: Missing scripts/gus_gas_common.py"
            exit 1
          fi

          if [ ! -f "scripts/create_base_2018.py" ]; then
            echo "ERROR: Missing scripts/create_base_2018.py"
            exit 1
          fi

          if [ ! -f "scripts/append_year.py" ]; then
            echo "ERROR: Missing scripts/append_year.py"
            exit 1
          fi

      - name: Run create base 2018
        if: ${{ github.event.inputs.mode == 'create_base_2018' }}
        env:
          GUS_DBW_API_KEY: ${{ secrets.GUS_DBW_API_KEY }}
        run: |
          python scripts/create_base_2018.py

      - name: Run append selected year
        if: ${{ github.event.inputs.mode == 'append_year' }}
        env:
          GUS_DBW_API_KEY: ${{ secrets.GUS_DBW_API_KEY }}
          GUS_YEAR: ${{ github.event.inputs.year }}
        run: |
          echo "Appending year: $GUS_YEAR"
          python scripts/append_year.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: gus-gas-master-excel
          path: gus_dbw_trade/gus_gas_TJ_2018_plus_IMPORT_EXPORT_MASTER.xlsx

      - name: Commit updated master Excel
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git status

          git add gus_dbw_trade/gus_gas_TJ_2018_plus_IMPORT_EXPORT_MASTER.xlsx

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ github.event.inputs.mode }}" = "create_base_2018" ]; then
              git commit -m "Create GUS gas master Excel for 2018"
            else
              git commit -m "Append GUS gas data for ${{ github.event.inputs.year }}"
            fi

            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
