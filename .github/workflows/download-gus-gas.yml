name: Download GUS gas data

on:
  workflow_dispatch:
  # opcjonalnie automatycznie raz dziennie np. o 6:00 UTC
  # schedule:
  #   - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  download-gus-gas:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests urllib3

      - name: Run GUS download script
        env:
          GUS_DBW_API_KEY: ${{ secrets.GUS_DBW_API_KEY }}
        run: |
          python scripts/download_gus_gas.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gus-gas-excel
          path: gus_dbw_trade/*.xlsx

      - name: Commit updated Excel files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add gus_dbw_trade/*.xlsx

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GUS gas import export data"
            git push
          fi
