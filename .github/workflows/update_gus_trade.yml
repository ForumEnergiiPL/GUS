name: Update GUS trade year

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to download, e.g. 2018"
        required: true
        default: "2018"
      create_new:
        description: "Create new master file and ignore existing one? true/false"
        required: true
        default: "false"

permissions:
  contents: write

concurrency:
  group: gus-trade-update
  cancel-in-progress: false

jobs:
  update-gus-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl urllib3

      - name: Show repository files before update
        run: |
          echo "Current repository structure:"
          find . -maxdepth 3 -type f | sort

      - name: Update selected GUS year
        run: |
          if [ "${{ github.event.inputs.create_new }}" = "true" ]; then
            python scripts/update_gus_trade_year.py --year ${{ github.event.inputs.year }} --create-new
          else
            python scripts/update_gus_trade_year.py --year ${{ github.event.inputs.year }}
          fi

      - name: Show generated files
        run: |
          echo "Generated files:"
          find gus_dbw_trade -type f | sort

      - name: Commit updated GUS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add gus_dbw_trade

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GUS trade data for ${{ github.event.inputs.year }}"
            git push
          fi
